syntax = "proto3";
package overlayward.v1;

import "overlayward/v1/common.proto";

service AuditService {
  rpc Query(AuditQueryRequest) returns (AuditQueryResponse);
  rpc GetDetail(AuditDetailRequest) returns (AuditEvent);
  rpc Replay(AuditReplayRequest) returns (stream AuditEvent);
}

message AuditQueryRequest {
  string sandbox_id = 1;
  string from = 2;
  string to = 3;
  string level = 4;
  int32 limit = 5;
  int32 offset = 6;
}

message AuditQueryResponse {
  repeated AuditEvent events = 1;
  int64 total = 2;
  bool has_more = 3;
}

message AuditDetailRequest {
  string sandbox_id = 1;
  string event_id = 2;
}

message AuditEvent {
  string id = 1;
  string timestamp = 2;
  string level = 3;
  string agent_id = 4;
  bytes content = 5;
}

message AuditReplayRequest {
  string sandbox_id = 1;
  string from = 2;
  string to = 3;
  double speed = 4;
}
