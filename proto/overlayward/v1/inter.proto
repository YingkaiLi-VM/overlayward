syntax = "proto3";
package overlayward.v1;

import "overlayward/v1/common.proto";

service InterService {
  rpc OpenChannel(InterConnectRequest) returns (Empty);
  rpc Send(InterSendRequest) returns (Empty);
  rpc Disconnect(InterDisconnectRequest) returns (Empty);
}

message InterConnectRequest {
  string sandbox_a = 1;
  string sandbox_b = 2;
  string mode = 3;
  bool bidirectional = 4;
}

message InterSendRequest {
  string from_sandbox = 1;
  string to_sandbox = 2;
  bytes message = 3;
}

message InterDisconnectRequest {
  string sandbox_a = 1;
  string sandbox_b = 2;
}
