syntax = "proto3";
package overlayward.v1;

import "overlayward/v1/common.proto";

service ApprovalService {
  rpc List(ApprovalListRequest) returns (ApprovalListResponse);
  rpc Decide(ApprovalDecideRequest) returns (Empty);
}

message ApprovalListRequest {
  string status = 1;
}

message ApprovalListResponse {
  repeated ApprovalInfo approvals = 1;
}

message ApprovalInfo {
  string approval_id = 1;
  string requester = 2;
  string sandbox_id = 3;
  string operation = 4;
  string status = 5;
  string created_at = 6;
  string timeout = 7;
  string reason = 8;
  string decision_reason = 9;
}

message ApprovalDecideRequest {
  string approval_id = 1;
  string decision = 2;
  string reason = 3;
  bool permanent = 4;
}
