syntax = "proto3";
package overlayward.v1;

import "overlayward/v1/common.proto";

service ExecService {
  rpc Run(ExecRunRequest) returns (ExecRunResponse);
  rpc Shell(stream ShellInput) returns (stream ShellOutput);
}

message ExecRunRequest {
  string sandbox_id = 1;
  string command = 2;
  string workdir = 3;
  map<string, string> env = 4;
  string timeout = 5;
  bytes stdin = 6;
}

message ExecRunResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  int64 duration_ms = 4;
}

message ShellInput {
  string sandbox_id = 1;
  string shell = 2;
  bytes data = 3;
  TermSize resize = 4;
}

message ShellOutput {
  bytes data = 1;
  int32 exit_code = 2;
  bool exited = 3;
}
