syntax = "proto3";
package overlayward.v1;

import "overlayward/v1/common.proto";

service NetworkService {
  rpc Get(SandboxIdRequest) returns (NetworkPolicy);
  rpc AllowRule(AddNetworkRuleRequest) returns (AddNetworkRuleResponse);
  rpc DenyRule(DeleteNetworkRuleRequest) returns (Empty);
  rpc SetDefault(SetDefaultNetworkRequest) returns (Empty);
}

message AddNetworkRuleRequest {
  string sandbox_id = 1;
  string domain = 2;
  string cidr = 3;
  repeated int32 ports = 4;
  string protocol = 5;
  string reason = 6;
}

message AddNetworkRuleResponse {
  oneof result {
    string rule_id = 1;
    ApprovalPending approval = 2;
  }
}

message DeleteNetworkRuleRequest {
  string sandbox_id = 1;
  string rule_id = 2;
}

message SetDefaultNetworkRequest {
  string sandbox_id = 1;
  string default_action = 2;
}
