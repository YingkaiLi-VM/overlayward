syntax = "proto3";
package overlayward.v1;

message Empty {}

message SandboxIdRequest {
  string sandbox_id = 1;
}

message GpuConfig {
  string device = 1;
  uint32 count = 2;
}

message NetworkPolicy {
  string default_action = 1;
  repeated NetworkRule rules = 2;
}

message NetworkRule {
  string rule_id = 1;
  string domain = 2;
  string cidr = 3;
  repeated int32 ports = 4;
  string protocol = 5;
}

message ApprovalPending {
  string approval_id = 1;
  string status = 2;
  string timeout = 3;
}

message ErrorDetail {
  string code = 1;
  string message = 2;
  map<string, string> metadata = 3;
}

message TermSize {
  uint32 cols = 1;
  uint32 rows = 2;
}
