[defines]
"target_os = windows" = "OW_WINDOWS"
"target_os = linux" = "OW_LINUX"
"target_os = macos" = "OW_MACOS"

language = "C"
include_guard = "OVERLAYWARD_H"
no_includes = true
sys_includes = ["stdint.h", "stdbool.h", "stddef.h"]
include_version = true
autogen_warning = "/* Auto-generated by cbindgen. Do not edit. */"

[export]
prefix = "ow_"
item_types = ["functions", "types", "opaque"]

[fn]
prefix = "OW_API"
postfix = ""
